<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKS Firewall Defender 2028</title>
    <style>
        body { margin: 0; background: #020208; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: #00ff66; }
        #gameContainer { position: relative; box-shadow: 0 0 50px rgba(0, 255, 102, 0.2); border: 2px solid #00ff66; border-radius: 8px; overflow: hidden; }
        canvas { background: #04040c; display: block; }
        #ui { position: absolute; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px #00ff66; pointer-events: none; }
        #instructions { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 14px; color: #88cfa3; pointer-events: none; }
        #gameOverScreen { position: absolute; top: 0; left: 0; width: 800px; height: 550px; background: rgba(2, 2, 8, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px); display: none; }
        h1 { font-size: 40px; margin: 0 0 10px 0; color: #ff3333; text-shadow: 0 0 20px #ff3333; }
        button { background: transparent; border: 2px solid #00ff66; padding: 10px 25px; font-size: 16px; color: #00ff66; font-family: inherit; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(0,255,102,0.2); }
        button:hover { background: #00ff66; color: #020208; box-shadow: 0 0 25px #00ff66; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">
        <div>CORE INTEGRITY: <span id="healthVal">100%</span></div>
        <div>VIRUS PURGED: <span id="scoreVal">0</span></div>
    </div>
    <div id="instructions">حرك الماوس يميناً ويساراً للتوجيه واضغط كليك شمال لإطلاق مضاد الفيروسات!</div>
    <canvas id="gameCanvas" width="800" height="550"></canvas>
    
    <div id="gameOverScreen">
        <h1>SYSTEM COMPROMISED</h1>
        <p style="font-size: 18px; margin-bottom: 20px; color: #fff;">تم تدمير الجدار الناري! نقاطك: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">إعادة تشغيل النظام المدافع</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let score = 0;
let health = 100;
let gameActive = true;

// المدافع (اللاعب)
let player = { x: 400, y: 500, width: 50, height: 25, color: "#00ff66" };
let bullets = [];
let enemies = [];
let enemySpeed = 2;
let spawnTimer = 0;

// الماوس والتحكم
canvas.addEventListener("mousemove", (e) => {
    let rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left - player.width / 2;
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
});

canvas.addEventListener("mousedown", () => {
    if (!gameActive) return;
    bullets.push({ x: player.x + player.width / 2 - 3, y: player.y, width: 6, height: 15, speed: 7, color: "#00ffff" });
});

function spawnEnemy() {
    let size = Math.random() * 20 + 20;
    enemies.push({
        x: Math.random() * (canvas.width - size),
        y: -size,
        size: size,
        speed: Math.random() * 1.5 + enemySpeed,
        color: "#ff3333"
    });
}

function update() {
    if (!gameActive) return;

    // تحديث الطلقات
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed;
        if (bullets[i].y < 0) bullets.splice(i, 1);
    }

    // ظهور الفيروسات
    spawnTimer++;
    if (spawnTimer > 40) {
        spawnEnemy();
        spawnTimer = 0;
        if (enemySpeed < 6) enemySpeed += 0.05; // تدرج الصعوبة
    }

    // تحديث الفيروسات والتحقق من التصادم
    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].y += enemies[i].speed;

        // اختراق الدفاعات الأرضية
        if (enemies[i].y > canvas.height) {
            health -= 20;
            document.getElementById("healthVal").innerText = health + "%";
            enemies.splice(i, 1);
            if (health <= 0) endGame();
            continue;
        }

        // تصادم الطلقات مع الفيروسات
        for (let j = bullets.length - 1; j >= 0; j--) {
            if (bullets[j].x > enemies[i].x && 
                bullets[j].x < enemies[i].x + enemies[i].size &&
                bullets[j].y > enemies[i].y && 
                bullets[j].y < enemies[i].y + enemies[i].size) {
                
                enemies.splice(i, 1);
                bullets.splice(j, 1);
                score += 10;
                document.getElementById("scoreVal").innerText = score;
                break;
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // الرسوميات الخلفية (مصفوفة البيانات الرقمية)
    ctx.fillStyle = "rgba(0, 255, 102, 0.05)";
    ctx.font = "12px monospace";
    for(let i=0; i<canvas.width; i+=30) {
        ctx.fillText(Math.floor(Math.random()*2), i, Math.random()*canvas.height);
    }

    // رسم اللاعب (السفينة البرمجية المضيئة)
    ctx.save();
    ctx.shadowBlur = 15;
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.restore();

    // رسم طلقات الليزر
    bullets.forEach(b => {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = b.color;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.width, b.height);
        ctx.restore();
    });

    // رسم الفيروسات المهاجمة (مربعات متوهجة باللون الأحمر)
    enemies.forEach(e => {
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = e.color;
        ctx.fillStyle = e.color;
        ctx.fillRect(e.x, e.y, e.size, e.size);
        ctx.restore();
    });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function endGame() {
    gameActive = false;
    document.getElementById("finalScore").innerText = score;
    document.getElementById("gameOverScreen").style.display = "flex";
}

function resetGame() {
    score = 0;
    health = 100;
    document.getElementById("scoreVal").innerText = "0";
    document.getElementById("healthVal").innerText = "100%";
    enemies = [];
    bullets = [];
    enemySpeed = 2;
    gameActive = true;
    document.getElementById("gameOverScreen").style.display = "none";
}

loop();
</script>

</body>
</html>
